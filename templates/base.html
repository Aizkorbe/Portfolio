<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portfolio{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        (function () {
            var t = localStorage.getItem("theme") || "light";
            document.documentElement.setAttribute("data-theme", t);
        })();
    </script>

    <style>
        :root {
            --bg: #f5f7fb;
            --surface: #ffffff;
            --surface-soft: #f8fafc;
            --border: #e5e7eb;
            --border-strong: #d6dbe4;
            --text: #0f172a;
            --muted: #667085;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-soft: #dbeafe;
            --secondary-bg: #eef2f7;
            --secondary-text: #334155;
            --success: #027a48;
            --success-soft: #ecfdf3;
            --danger: #b42318;
            --danger-hover: #912018;
            --danger-soft: #fef3f2;
            --shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 8px;
            --container: 1180px;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-soft: #172033;
            --border: #2d3f55;
            --border-strong: #3d5068;
            --text: #f1f5f9;
            --muted: #8fa3bf;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --primary-soft: #1e3058;
            --secondary-bg: #2d3f55;
            --secondary-text: #cbd5e1;
            --success: #34d399;
            --success-soft: #022c22;
            --danger: #f87171;
            --danger-hover: #ef4444;
            --danger-soft: #3b0a0a;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
        }

        [data-theme="dark"] p { color: #8fa3bf; }
        [data-theme="dark"] label { color: #cbd5e1; }
        [data-theme="dark"] thead th { background: #172033; color: #8fa3bf; }
        [data-theme="dark"] table { background: #1e293b; }
        [data-theme="dark"] tbody tr:hover { background: #263348; }
        [data-theme="dark"] tbody td { border-bottom-color: #2d3f55; }
        [data-theme="dark"] input,
        [data-theme="dark"] select,
        [data-theme="dark"] textarea { background: #0f172a; color: #f1f5f9; border-color: #2d3f55; }
        [data-theme="dark"] input::placeholder,
        [data-theme="dark"] textarea::placeholder { color: #4a5f7a; }
        [data-theme="dark"] .nav-link { color: #cbd5e1; }
        [data-theme="dark"] .nav-link:hover { background: #1e3058; color: #3b82f6; border-color: #1e3058; }
        [data-theme="dark"] .btn-secondary,
        [data-theme="dark"] .btn-link.btn-secondary { border-color: #2d3f55; }
        [data-theme="dark"] code { background: #172033; color: #94a3b8; padding: 2px 5px; border-radius: 4px; }
        [data-theme="dark"] .table-wrap { border-color: #2d3f55; }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 16px;
            line-height: 1.55;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        a {
            color: var(--primary);
            text-decoration: none;
        }

        a:hover {
            text-decoration: none;
        }

        .container {
            max-width: var(--container);
            margin: 0 auto;
            padding: 22px;
        }

        .app-shell {
            display: grid;
            gap: 20px;
            min-width: 0;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .brand-mark {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 15px;
            letter-spacing: -0.03em;
            box-shadow: 0 10px 24px rgba(37, 99, 235, 0.22);
            flex-shrink: 0;
        }

        .brand-copy {
            min-width: 0;
        }

        .brand-title {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin: 0;
            line-height: 1.1;
        }

        .brand-subtitle {
            margin: 3px 0 0;
            color: var(--muted);
            font-size: 13px;
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 14px;
            border-radius: 999px;
            color: #334155;
            background: transparent;
            border: 1px solid transparent;
            font-weight: 700;
            font-size: 14px;
            transition: 0.2s ease;
        }

        .nav-link:hover {
            background: #eef2ff;
            color: var(--primary);
            border-color: #dbeafe;
        }

        .nav-link.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
        }

        h1, h2, h3 {
            margin-top: 0;
            color: var(--text);
            letter-spacing: -0.03em;
        }

        h1 {
            font-size: 24px;
            line-height: 1.15;
            font-weight: 800;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 18px;
            line-height: 1.2;
            font-weight: 800;
            margin-bottom: 10px;
        }

        h3 {
            font-size: 16px;
            line-height: 1.25;
            font-weight: 700;
            margin-bottom: 8px;
        }

        p {
            margin-top: 0;
            margin-bottom: 12px;
            color: #475467;
        }

        .muted {
            color: var(--muted);
        }

        .num {
            text-align: right;
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum";
        }

        .pnl-pos {
            color: var(--success);
            font-weight: 700;
        }

        .pnl-neg {
            color: var(--danger);
            font-weight: 700;
        }

        .empty {
            color: var(--muted);
            margin-bottom: 0;
        }

        .btn-primary,
        .btn-secondary,
        .btn-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 42px;
            padding: 0 16px;
            border-radius: 12px;
            border: 1px solid transparent;
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            line-height: 1;
            cursor: pointer;
            text-decoration: none;
            transition: 0.2s ease;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.18);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            border-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-secondary,
        .btn-link.btn-secondary {
            background: var(--secondary-bg);
            color: var(--secondary-text);
            border-color: #dde3ec;
        }

        .btn-secondary:hover,
        .btn-link.btn-secondary:hover {
            background: #e6ebf2;
            color: #1f2937;
            transform: translateY(-1px);
        }

        .btn-link {
            text-decoration: none;
        }

        button {
            font: inherit;
        }

        input,
        select,
        textarea {
            width: 100%;
            min-height: 44px;
            border: 1px solid var(--border-strong);
            border-radius: 12px;
            padding: 12px 14px;
            background: #ffffff;
            color: var(--text);
            font: inherit;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        input::placeholder,
        textarea::placeholder {
            color: #98a2b3;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #93c5fd;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        label {
            font-size: 14px;
            font-weight: 700;
            color: #334155;
        }

        textarea {
            min-height: 110px;
            resize: vertical;
        }

        .table-wrap {
            width: 100%;
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
            background: white;
        }

        thead th {
            background: #f8fafc;
            color: #344054;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            font-size: 12px;
            font-weight: 800;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            text-align: left;
            white-space: nowrap;
        }

        tbody td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover {
            background: #fafcff;
        }

        .status-buy,
        .status-sell {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.03em;
        }

        .status-buy {
            background: var(--success-soft);
            color: var(--success);
        }

        .status-sell {
            background: var(--danger-soft);
            color: var(--danger);
        }

        .page-stack {
            display: grid;
            gap: 20px;
            min-width: 0;
        }

        .page-stack > * {
            min-width: 0;
        }

        .flash-list {
            display: grid;
            gap: 10px;
        }

        .flash {
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
        }

        .flash-success {
            background: var(--success-soft);
            color: var(--success);
            border: 1px solid #a6f4c5;
        }

        .flash-error {
            background: var(--danger-soft);
            color: var(--danger);
            border: 1px solid #fda29b;
        }

        @media (max-width: 860px) {
            .container {
                padding: 16px;
            }

            .card {
                padding: 18px;
            }

            .topbar {
                align-items: flex-start;
            }

            .nav {
                width: 100%;
            }

            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-shell">
            <header class="topbar">
                <div class="brand">
                    <div class="brand-mark">PF</div>
                    <div class="brand-copy">
                        <p class="brand-title">Portfolio</p>
                        <p class="brand-subtitle">Seguimiento simple de operaciones y cartera</p>
                    </div>
                </div>

                <nav class="nav">
                    <a href="{{ url_for('index') }}"
                       class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
                        Inicio
                    </a>
                    <a href="{{ url_for('operaciones') }}"
                       class="nav-link {% if request.endpoint in ['operaciones', 'editar_operacion'] %}active{% endif %}">
                        Operaciones
                    </a>
                    <a href="{{ url_for('cartera') }}"
                       class="nav-link {% if request.endpoint == 'cartera' %}active{% endif %}">
                        Cartera
                    </a>
                    <button id="theme-toggle" class="nav-link" style="background:none;border:1px solid var(--border);cursor:pointer;" title="Cambiar tema"></button>
                </nav>
            </header>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="flash-list">
                {% for category, message in messages %}
                <div class="flash flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <main class="page-stack">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    <script>
        (function () {
            var btn = document.getElementById("theme-toggle");
            function applyTheme(t) {
                document.documentElement.setAttribute("data-theme", t);
                btn.textContent = t === "dark" ? "Modo claro" : "Modo oscuro";
            }
            applyTheme(localStorage.getItem("theme") || "light");
            btn.addEventListener("click", function () {
                var next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
                localStorage.setItem("theme", next);
                applyTheme(next);
            });
        })();
    </script>
</body>
</html>
